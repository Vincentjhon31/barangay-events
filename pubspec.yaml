name: barangay_events
description: A barangay calendar app for event scheduling and sharing.
publish_to: 'none'
version: 1.0.2+7
environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.15.0
  
  # Google Sign-In (for email sending via Laravel)
  google_sign_in: ^6.2.1
  
  # Calendar UI (the main thing you want to see)
  table_calendar: ^3.0.9
  
  # State management (simple & effective for solo dev)
  flutter_riverpod: ^2.4.9
  
  # File attachments
  image_picker: ^1.0.7
  path_provider: ^2.1.1
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^8.0.2
  package_info_plus: ^8.0.2
  
  # For async UI handling
  flutter_bloc: ^8.1.3  # Optional but recommended

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  freezed: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
