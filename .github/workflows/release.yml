name: Build and Release APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # or latest stable
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk -F': ' '{print $2}' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up signing configuration
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_FILE }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "Using provided keystore for release signing"
            echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
            echo "storeFile=$(pwd)/keystore.jks" >> key.properties
            echo "signing_mode=provided" >> $GITHUB_OUTPUT
          else
            echo "Generating debug keystore for release build (not signed for production)"
            keytool -genkeypair               -v               -keystore debug.keystore               -storetype JKS               -keyalg RSA               -keysize 2048               -validity 10000               -alias androiddebugkey               -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=Debug"               -storepass android               -keypass android               -noprompt
            echo "storePassword=android" > key.properties
            echo "keyPassword=android" >> key.properties
            echo "keyAlias=androiddebugkey" >> key.properties
            echo "storeFile=$(pwd)/debug.keystore" >> key.properties
            echo "signing_mode=debug" >> $GITHUB_OUTPUT
          fi

      - name: Set up Android signing
        run: |
          mkdir -p android
          cp key.properties android/key.properties

      - name: Build APK (release)
        run: |
          flutter build apk --release --no-split-per-abi

      - name: Verify APK exists
        run: |
          ls -lh build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
