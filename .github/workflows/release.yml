name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify release signing secrets
        run: |
          missing=0
          for secret_name in KEYSTORE_FILE KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is required for update-safe GitHub Releases."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the Android signing secrets in repository Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Configure release signing
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > keystore.jks
          cat > android/key.properties <<EOF
          storeFile=../../keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Extract app version
        id: version
        run: |
          VERSION="$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build APK
        run: flutter build apk --release --no-split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barangay-events-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Barangay Events ${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
